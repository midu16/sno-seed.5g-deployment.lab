name: Deploy SNO Seed Cluster

permissions:
  contents: read

concurrency:
  group: sno-seed-deployment
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      deployment_type:
        description: "ImageSet mode (README) — ga → make imageset-ga; prega → make imageset-prega"
        type: choice
        options:
          - prega
          - ga
        required: true
        default: prega
      ocp_version:
        description: "OpenShift version (make download-oc-tools, imageset-*, release image tag)"
        required: true
        default: "4.22.0-ec.5"
      registry_url:
        description: "Mirror registry host:port (no docker:// prefix)"
        required: true
        default: "infra.5g-deployment.lab:8443"
      dest_namespace:
        description: "Destination path on registry (e.g. seed)"
        required: true
        default: "seed"
      imageset_config:
        description: "Image set config file in repo root"
        required: true
        default: "imageset-config.yml"
      workspace_dir:
        description: "Local workspace directory for oc-mirror (file:// prefix added automatically)"
        required: true
        default: "seed"
      docker_config:
        description: "Path to Docker config with registry pull secret (runner: often /root/.docker)"
        required: true
        default: "/root/.docker"
      log_level:
        description: "oc-mirror log level"
        required: true
        default: "debug"
      parallel_images:
        description: "Parallel images"
        required: true
        default: "10"
      parallel_layers:
        description: "Parallel layers"
        required: true
        default: "10"
      remote_seed_host:
        description: "Optional — SSH host for extra VM cleanup (empty skips remote VM step)"
        required: false
        default: ""
      remote_seed_vm:
        description: "Optional — VM name on remote_seed_host (used with remote_seed_host)"
        required: false
        default: ""

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  OCP_VERSION: ${{ github.event.inputs.ocp_version }}
  REGISTRY_URL: ${{ github.event.inputs.registry_url }}
  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

jobs:
  clean-sno-seed:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 180
    env:
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

    steps:
      - name: Fix workspace ownership
        run: sudo chown -R "$(whoami):$(whoami)" "${GITHUB_WORKSPACE}/"

      - name: 🗑️ Clean up previous SNO SEED Virtual
        run: |
          if sudo kcli list plan | grep -q "sno-seed "; then
            echo "Deleting sno-seed plan on local host..."
            sudo kcli delete plan sno-seed -y
          else
            echo "Plan sno-seed does not exist on local host — skipping."
          fi
          if sudo ssh root@INBACRNRDL0103 'sudo kcli list plan | grep -q "sno-seed "'; then
            echo "Deleting sno-seed plan on remote INBACRNRDL0103..."
            sudo ssh root@INBACRNRDL0103 'sudo kcli delete plan sno-seed -y'
          else
            echo "Plan sno-seed does not exist on remote — skipping."
          fi

      - name: 🗑️ Clean up old registry content
        run: sudo rm -rf /home/registry/data/docker || true

      - name: 🗑️ Clean oc-mirror cache
        run: sudo rm -rf /root/.oc-mirror/.cache || true

      - name: 🗑️ Clean podman unused images
        run: sudo podman system prune -a || true

      - name: 🔄 Restart podman-registry
        run: |
          sudo systemctl restart podman-registry.service
          sudo systemctl status podman-registry.service || true

      - name: 🧹 Remove remote Seed VM (if provided)
        if: ${{ github.event.inputs.remote_seed_host != '' && github.event.inputs.remote_seed_vm != '' }}
        run: |
          REMOTE="${{ github.event.inputs.remote_seed_host }}"
          VM="${{ github.event.inputs.remote_seed_vm }}"
          SSH_TIMEOUT=30

          echo "Cleaning Seed VM: $VM on $REMOTE"

          if ! timeout $SSH_TIMEOUT ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 "$REMOTE" true 2>/dev/null; then
            echo "⚠️ Could not SSH to $REMOTE — skipping VM cleanup"
            exit 0
          fi

          if ssh "$REMOTE" "kcli list vm | grep -q '^$VM'"; then
            echo "Deleting VM $VM ..."
            ssh "$REMOTE" "kcli delete vm $VM -y" || true
          else
            echo "ℹ️ VM $VM not found on remote host"
          fi


  oc-mirror:
    needs: clean-sno-seed
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 720
    env:
      KUBECONFIG_PATH: ${{ github.workspace }}/seed/auth/kubeconfig

    steps:
      - name: Fix workspace ownership
        run: sudo chown -R "$(whoami):$(whoami)" "${GITHUB_WORKSPACE}/"

      - uses: actions/checkout@v6

      - name: Download OpenShift client tools (if needed)
        run: |
          if [[ ! -x ./bin/oc-mirror ]] || [[ ! -x ./bin/oc ]]; then
            sudo make download-oc-tools VERSION="${OCP_VERSION}"
          else
            echo "Using existing ./bin/oc-mirror and ./bin/oc"
            ls -la ./bin/oc-mirror ./bin/oc
          fi

      - name: Generate imageset-config.yml (GA or PreGA per README)
        run: |
          set -euo pipefail
          if [[ "${{ github.event.inputs.deployment_type }}" == "ga" ]]; then
            sudo make imageset-ga VERSION="${OCP_VERSION}"
          else
            sudo make imageset-prega VERSION="${OCP_VERSION}"
          fi

      - name: Review generated imageset-config.yml
        run: |
          echo "Generated imageset-config.yml:"
          cat "${{ github.event.inputs.imageset_config }}"

      - name: Run oc-mirror v2
        run: |
          set -euo pipefail
          DOCKER_CONFIG="${{ github.event.inputs.docker_config }}"
          export DOCKER_CONFIG
          DEST="docker://${{ github.event.inputs.registry_url }}/${{ github.event.inputs.dest_namespace }}"
          WS="file://${{ github.event.inputs.workspace_dir }}/"
          CFG="${{ github.event.inputs.imageset_config }}"
          LOG="${{ github.event.inputs.log_level }}"
          PI="${{ github.event.inputs.parallel_images }}"
          PL="${{ github.event.inputs.parallel_layers }}"

          echo "DOCKER_CONFIG=${DOCKER_CONFIG}"
          echo "Destination: ${DEST}"
          echo "Workspace: ${WS}"
          echo "Config: ${CFG}"

          max_attempts=5
          for attempt in $(seq 1 "${max_attempts}"); do
            echo "oc-mirror attempt ${attempt}/${max_attempts}"
            mirror_ok=0
            # Registry creds live in DOCKER_CONFIG; use sudo when config is under /root
            if [[ "${DOCKER_CONFIG}" == /root/* ]]; then
              if sudo -E env DOCKER_CONFIG="${DOCKER_CONFIG}" ./bin/oc-mirror \
                -c "${CFG}" \
                --v2 \
                --workspace "${WS}" \
                "${DEST}" \
                --max-nested-paths 10 \
                --parallel-images "${PI}" \
                --parallel-layers "${PL}" \
                --dest-tls-verify=false \
                --log-level "${LOG}"; then
                mirror_ok=1
              fi
            else
              if ./bin/oc-mirror \
                -c "${CFG}" \
                --v2 \
                --workspace "${WS}" \
                "${DEST}" \
                --max-nested-paths 10 \
                --parallel-images "${PI}" \
                --parallel-layers "${PL}" \
                --dest-tls-verify=false \
                --log-level "${LOG}"; then
                mirror_ok=1
              fi
            fi
            if [[ "${mirror_ok}" -eq 1 ]]; then
              echo "oc-mirror succeeded on attempt ${attempt}"
              break
            fi
            if [[ "${attempt}" -ge "${max_attempts}" ]]; then
              echo "::error::oc-mirror failed after ${max_attempts} attempts"
              exit 1
            fi
            echo "oc-mirror failed (attempt ${attempt}/${max_attempts}); retrying in 60s..."
            sleep 60
          done

  sno-seed-vm:
    needs: oc-mirror
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 720
    env:
      KUBECONFIG_PATH: ${{ github.workspace }}/seed/auth/kubeconfig

    steps:
      - name: Fix workspace ownership
        run: sudo chown -R "$(whoami):$(whoami)" "${GITHUB_WORKSPACE}/"

      - uses: actions/checkout@v6

      - name: Review generated cluster resources (README)
        run: |
          echo "Generated cluster resources (${{ github.event.inputs.workspace_dir }}/working-dir/cluster-resources/):"
          ls -la "${{ github.event.inputs.workspace_dir }}/working-dir/cluster-resources/" || true

      - name: 🔍 Validate AirGapped registry catalog
        run: |
          curl -sk -u "${REGISTRY_USERNAME}:${REGISTRY_PASSWORD}" \
            "https://${REGISTRY_URL}/v2/_catalog" | jq . || echo "⚠️ Registry check failed"
  
      - name: ⚙️ Prepare install-config (Makefile — README Preparing the Installation)
        run: |
          set -euo pipefail
          sudo make fetch-certificate REGISTRY_URL="${REGISTRY_URL}"
          sudo make registry-pull-secret USERNAME="${REGISTRY_USERNAME}" PASSWORD="${REGISTRY_PASSWORD}" REGISTRY_URL="${REGISTRY_URL}"
          sudo make update-sshkey SSHKEY_FILE="/root/.ssh/id_rsa.pub"
          sudo make catalog-source-disconnected \
            REGISTRY_URL="${REGISTRY_URL}" \
            DEST_NAMESPACE="${{ github.event.inputs.dest_namespace }}" \
            OCP_VERSION="${OCP_VERSION}"
      - name: Download OpenShift client tools (if needed)
        run: |
          if [[ ! -x ./bin/oc-mirror ]] || [[ ! -x ./bin/oc ]]; then
            sudo make download-oc-tools VERSION="${OCP_VERSION}"
          else
            echo "Using existing ./bin/oc-mirror and ./bin/oc"
            ls -la ./bin/oc-mirror ./bin/oc
          fi

      - name: Extract openshift-install (Makefile — README)
        run: |
          set -euo pipefail
          RELEASE_IMAGE="${REGISTRY_URL}/${{ github.event.inputs.dest_namespace }}/openshift/release-images:${OCP_VERSION}-x86_64"
          echo "RELEASE_IMAGE=${RELEASE_IMAGE}"
          sudo make generate-openshift-install RELEASE_IMAGE="${RELEASE_IMAGE}"

      - name: Generate agent ISO (Makefile — same as README openshift-install agent create)
        run: sudo make create-agent-iso

      - name: 📤 Copy agent ISO to webcache (README)
        run: |
          set -euo pipefail
          SRC="${GITHUB_WORKSPACE}/seed/agent.x86_64.iso"
          if [[ ! -f "$SRC" ]]; then
            echo "❌ Expected ISO not found at $SRC (run make create-agent-iso)"
            exit 1
          fi
          sudo mkdir -p /opt/webcache/data
          sudo cp "$SRC" /opt/webcache/data/agent.x86_64.iso
          echo "✅ Copied $SRC to /opt/webcache/data/agent.x86_64.iso"

      - name: 🖥️ Create SNO VM
        run: |
          set -euo pipefail
          sudo kcli create vm \
            -P start=True \
            -P uefi_legacy=true \
            -P plan=sno-seed \
            -P memory=32768 \
            -P numcpus=16 \
            -P disks=[120,50] \
            -P nets='[{"name": "br0", "mac": "aa:aa:aa:aa:05:01"}]' \
            -P uuid=aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaa0501 \
            -P name=seed-ctlplane-0 \
            -P iso=/opt/webcache/data/agent.x86_64.iso

      - name: ⏱️ Wait for installation to complete (README — Start the Installation)
        run: sudo ./bin/openshift-install --dir "${GITHUB_WORKSPACE}/seed/" agent wait-for install-complete --log-level=info

      - name: Access and verify cluster (README — Start the Installation & Post-Installation)
        run: |
          set -euo pipefail
          export KUBECONFIG="${KUBECONFIG_PATH}"
          OC="./bin/oc"

          echo "=== Nodes ==="
          sudo -E "$OC" get nodes -o wide

          echo "=== ClusterVersion ==="
          sudo -E "$OC" get clusterversion

          echo "=== Cluster operators ==="
          sudo -E "$OC" get co

          echo "=== CatalogSources (openshift-marketplace) ==="
          sudo -E "$OC" get catalogsource -n openshift-marketplace -o wide

          echo "::group::CatalogSource YAML (openshift-marketplace)"
          sudo -E "$OC" get catalogsource -n openshift-marketplace -o yaml
          echo "::endgroup::"

          echo "=== PackageManifests (openshift-marketplace) ==="
          pm_count=$(sudo -E "$OC" get packagemanifests -n openshift-marketplace --no-headers 2>/dev/null | wc -l | tr -d ' ')
          echo "PackageManifest count: ${pm_count}"
          sudo -E "$OC" get packagemanifests -n openshift-marketplace -o custom-columns=NAME:.metadata.name 2>/dev/null | head -80 || true
          if [[ "${pm_count:-0}" -gt 79 ]]; then
            echo "(listing truncated; total ${pm_count})"
          fi

          echo "=== ClusterServiceVersions (all namespaces) — name, version, phase ==="
          sudo -E "$OC" get csv -A -o custom-columns='NAMESPACE:.metadata.namespace,NAME:.metadata.name,VERSION:.spec.version,PHASE:.status.phase' 2>/dev/null || sudo -E "$OC" get csv -A

          echo "=== Operators API (installed operators overview, if available) ==="
          if sudo -E "$OC" get operators -A --request-timeout=30s &>/dev/null; then
            sudo -E "$OC" get operators -A -o wide --request-timeout=30s
          else
            echo "(oc get operators not available or empty; CSV table above lists installed operator versions)"
          fi

          echo "=== Operator workload pods (namespaces from workingdir/openshift/99_02_operators.yaml) ==="
          OPERATORS_YAML="${GITHUB_WORKSPACE}/workingdir/openshift/99_02_operators.yaml"
          if [[ ! -f "${OPERATORS_YAML}" ]]; then
            echo "::warning::Operator manifest not found at ${OPERATORS_YAML} — skipping namespace pod checks"
          else
            mapfile -t OPERATOR_NAMESPACES < <(awk '
              /^kind: Namespace$/ { in_ns=1; next }
              /^kind:/ && $0 != "kind: Namespace" { in_ns=0 }
              in_ns && /^  name:/ { sub(/^  name:[[:space:]]*/, ""); print; in_ns=0; next }
            ' "${OPERATORS_YAML}")
            if [[ "${#OPERATOR_NAMESPACES[@]}" -eq 0 ]]; then
              echo "::warning::No Namespace documents found in ${OPERATORS_YAML}"
            else
              echo "Namespaces from manifest (${#OPERATOR_NAMESPACES[@]}): ${OPERATOR_NAMESPACES[*]}"
              pod_issues=0
              for ns in "${OPERATOR_NAMESPACES[@]}"; do
                echo "::group::Pods — namespace ${ns}"
                if ! sudo -E "$OC" get namespace "${ns}" --request-timeout=30s &>/dev/null; then
                  echo "::warning::Namespace ${ns} does not exist on the cluster yet"
                  echo "::endgroup::"
                  pod_issues=$((pod_issues + 1))
                  continue
                fi
                sudo -E "$OC" get pods -n "${ns}" -o wide --request-timeout=60s || true
                sudo -E "$OC" get events -n "${ns}" --field-selector=type!=Normal --no-headers 2>/dev/null | tail -20 \
                  || echo "(no recent warning/error events, or events API unavailable)"
                # Flag pods that are not Running, Succeeded, or Completed (best-effort; wide output above is canonical)
                bad=$(sudo -E "$OC" get pods -n "${ns}" --no-headers --request-timeout=60s 2>/dev/null \
                  | awk '$3 !~ /^(Running|Succeeded|Completed)$/' || true)
                if [[ -n "${bad}" ]]; then
                  echo "::warning::Namespace ${ns} has pod(s) not in Running/Succeeded/Completed:"
                  echo "${bad}"
                  pod_issues=$((pod_issues + 1))
                fi
                echo "::endgroup::"
              done
              if [[ "${pod_issues}" -gt 0 ]]; then
                echo "::notice::One or more operator namespaces from 99_02_operators.yaml need attention (missing NS or non-ready pods). Review the grouped logs above."
              fi
            fi
          fi

          echo "=== Subscriptions (optional reference) ==="
          sudo -E "$OC" get subscription -A -o custom-columns='NAMESPACE:.metadata.namespace,NAME:.metadata.name,CHANNEL:.spec.channel,CURRENT:.status.currentCSV' 2>/dev/null | head -60 || true

